services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: urskool_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - urskool

  web:
    image: nginx:1.27-alpine
    container_name: urskool_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - urskool

  node:
    image: node:20-alpine
    container_name: urskool_node
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run build && tail -f /dev/null"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: "5173"
    volumes:
      - ./:/var/www/html
    depends_on:
      - web
    networks:
      - urskool

  db:
    image: mysql:8.4
    container_name: urskool_db
    environment:
      MYSQL_DATABASE: urskool
      MYSQL_USER: urskool
      MYSQL_PASSWORD: urskool
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - urskool

volumes:
  db_data:

networks:
  urskool:
    driver: bridge
